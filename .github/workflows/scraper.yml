name: Fase 1 — Datos Urgentes SIL
 
on:
  schedule:
    - cron: '0 8 * * *'   # 2am Costa Rica (UTC-6 = 08:00 UTC)
  workflow_dispatch:       # Permite ejecutar manualmente desde GitHub
 
jobs:
  fase1:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # Máximo 60 min — si tarda más, algo está muy mal
 
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          ref: main
 
      - name: Instalar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Cache de dependencias pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('extractor_proyectos/requirements.txt') }}
 
      - name: Instalar dependencias Python
        working-directory: extractor_proyectos
        run: pip install -r requirements.txt
 
      - name: Workaround DNS — Asamblea Costa Rica
        run: |
          sudo bash -c 'echo "196.40.23.181 www.asamblea.go.cr" >> /etc/hosts'
          sudo bash -c 'echo "196.40.23.181 asamblea.go.cr" >> /etc/hosts'
          echo "Verificando DNS..."
          ping -c 2 www.asamblea.go.cr || echo "Ping bloqueado — continuando de todas formas"
          curl -sI --max-time 10 https://www.asamblea.go.cr | head -5 || echo "curl check falló — continuando"
 
      - name: Instalar Chromium (Playwright)
        run: playwright install chromium --with-deps
 
      - name: Ejecutar Fase 1
        working-directory: extractor_proyectos
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CI: "true"
        run: python fase1_scraper.py
 
      - name: Subir artifacts (datos + debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fase1-output-${{ github.run_number }}
          path: |
            extractor_proyectos/fase1_*.json
            extractor_proyectos/fase1_*.xlsx
            extractor_proyectos/debug_fase1_*.png
            extractor_proyectos/debug_fase1_*.html
          if-no-files-found: ignore
          retention-days: 7