# .github/workflows/scraper.yml

name: Scraper Asamblea Legislativa

on:
  schedule:
    - cron: '0 8 * * *'  # 2am costa rica
  workflow_dispatch:
    inputs:
      max_paginas:
        description: 'Límite de páginas (0 = todas)'
        required: false
        default: '1'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache de dependencias pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Instalar dependencias Python
        working-directory: extractor_proyectos
        run: pip install -r requirements.txt

      - name: Instalar Chromium (Playwright)
        run: playwright install chromium --with-deps

      - name: Correr scraper
        working-directory: extractor_proyectos
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MAX_PAGINAS: ${{ github.event.inputs.max_paginas || '50' }}
        run: python extraer_proyectos.py

      - name: Subir artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-output-${{ github.run_number }}
          path: |
            *.json
            *.xlsx
            *.png
          retention-days: 7