services:

  # ── Reverse proxy: entrada única al puerto 80 ──────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped

  # ── API FastAPI ────────────────────────────────────────────────
  api:
    build: ./api
    env_file: .env
    expose:
      - "8000"
    restart: unless-stopped

  # ── Frontend Next.js ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        # Lee NEXT_PUBLIC_API_URL del .env para inyectarlo en el build
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
    env_file: .env
    expose:
      - "3000"
    restart: unless-stopped

  # ── Scraper Fase 2 (bucle infinito) ───────────────────────────
  scraper-fase2:
    build: ./extractor_proyectos
    command: python fase2_paralelo.py --daemon --workers 2
    env_file: .env
    environment:
      - CI=true          # Chromium headless obligatorio en Docker
    volumes:
      - scraper-sync:/tmp/scraper-sync
    restart: unless-stopped
    healthcheck:
      # Falla si el heartbeat tiene más de 10 minutos sin actualizarse
      test: ["CMD", "find", "/tmp/scraper_heartbeat", "-mmin", "-10"]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 2m

  # ── Scraper Fase 1 (cron diario) ──────────────────────────────
  scraper-fase1:
    build: ./extractor_proyectos
    # Corre crond; fase1 a las 7:00 UTC (1am CR). Crea lock mientras corre para pausar fase2.
    command: sh -c "echo '0 7 * * * touch /tmp/scraper-sync/fase1.lock && cd /app && python fase1_scraper.py >> /var/log/fase1.log 2>&1; rm -f /tmp/scraper-sync/fase1.lock' | crontab - && crond -f -l 2"
    env_file: .env
    environment:
      - CI=true
    volumes:
      - scraper-sync:/tmp/scraper-sync
    restart: unless-stopped

volumes:
  scraper-sync:
